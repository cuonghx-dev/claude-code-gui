name: Release

# Phase 6 skeleton. Wires up signing, notarization, updater manifest in
# Phase 6. Phase 0 ships this file as a placeholder so the release pipeline
# is visible from day one.

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-universal
            runner: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-universal
            runner: macos-latest
            target: x86_64-apple-darwin
          - platform: windows
            runner: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: linux
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        if: matrix.runner == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: bun install --cwd frontend --frozen-lockfile

      - name: Build (Phase 6 will add signing)
        working-directory: src-tauri
        env:
          # Phase 6: TAURI_PRIVATE_KEY, TAURI_KEY_PASSWORD,
          # APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD,
          # APPLE_NOTARIZATION_API_KEY, APPLE_NOTARIZATION_API_ISSUER,
          # WINDOWS_CERTIFICATE_THUMBPRINT
          NOOP: 'phase-6-fills-this-in'
        run: cargo build --release --workspace --target ${{ matrix.target }}

      # Phase 6 will add: cargo tauri build, codesign, notarize, staple,
      # generate updater manifest, upload artifacts.
